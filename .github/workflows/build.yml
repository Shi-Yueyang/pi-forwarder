name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Stage artifacts
        shell: bash
        run: |
          cp config/forwarder.json .
          # Linux: exe is at build/forwarder
          # Windows: exe is at build/Release/forwarder.exe
          if [ -f build/forwarder ]; then
            cp build/forwarder .
          fi
          if [ -f build/Release/forwarder.exe ]; then
            cp build/Release/forwarder.exe .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: pi-forwarder-${{ matrix.os }}
          path: |
            forwarder
            forwarder.exe
            forwarder.json
